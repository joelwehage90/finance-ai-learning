services:
  backend:
    build:
      context: ..              # = projects/ — includes fortnox-mcp, sie-pipeline
      dockerfile: excel-addin/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excel_addin
      POSTGRES_USER: postgres
      # SECURITY (S4): Use a strong, random password in production.
      # Override via env file or docker-compose.override.yml.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # SECURITY (S4): Bind to localhost only — prevents access from
      # other machines on the network.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
